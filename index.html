<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGR Eid Challenge - التسجيل المباشر</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
    
    body { 
      margin: 0; padding: 0; font-family: 'Cairo', sans-serif; color: #fff; text-align: center; 
      background: #000 url('static/bg.jpg') no-repeat center center fixed; 
      background-size: cover; scroll-behavior: smooth; 
    }
    
    /* 🎯 الهيدر متظبط عشان اللوجو يظهر بوضوح */
    header {
      padding: 30px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 🔥 اللوجو بالألوان الطبيعية وحجم 120 بكسل */
    .header-icons { 
      width: 120px !important; 
      height: auto !important; 
      display: block;
      margin: 10px auto;
      filter: none; /* شيلنا السيلفر عشان يرجع لألوانه الطبيعية */
      transition: 0.3s;
    }

    .header-icons:hover {
      transform: scale(1.05);
    }

    h1 { 
      font-size: 1.6em; 
      color: #d1d1d1; 
      margin: 15px 0 25px 0; 
    }

    /* الزرار سيلفر شيك وبدون رموز */
    .start-btn { 
      background: linear-gradient(145deg, #d1d1d1, #a1a1a1); 
      color: #000; padding: 12px 35px; font-size: 1.2em; font-weight: bold; 
      border: 1px solid #fff; border-radius: 50px; cursor: pointer; 
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2); transition: 0.3s;
    }
    .start-btn:hover { background: #fff; transform: scale(1.05); }

    main { 
      display: none; padding: 25px 15px; backdrop-filter: blur(15px); 
      background-color: rgba(0, 0, 0, 0.9); margin: 5px auto 40px auto; 
      border-radius: 20px; max-width: 650px; border: 1px solid rgba(255, 255, 255, 0.2); 
    }
    
    .details { 
      text-align: right; margin-bottom: 25px; padding: 12px; 
      border-right: 4px solid #d1d1d1; background-color: rgba(255, 255, 255, 0.05); 
      font-size: 0.85em; line-height: 1.8;
    }

    .form-section { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px; }
    .input-wrapper { width: 48%; display: flex; flex-direction: column; text-align: right; }
    .full-width { width: 100%; }

    label { font-weight: bold; color: #d1d1d1; margin-bottom: 5px; font-size: 0.85em; }
    
    input, select { 
      padding: 12px; border-radius: 8px; border: 1px solid #444; 
      background: #fff; color: #222; width: 100%; box-sizing: border-box; 
      font-family: 'Cairo', sans-serif; font-size: 0.95em; 
    }
    
    button#submitBtn { 
      background: linear-gradient(45deg, #7f8c8d, #34495e); 
      color: #fff; font-weight: bold; font-size: 1.2em; padding: 14px; 
      border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; width: 100%; 
    }

    @media (max-width: 600px) { .input-wrapper { width: 100%; } }
  </style>
</head>
<body>

<header>
  <img src="static/logo.png" alt="AGR Logo" class="header-icons">
  <h1>تحدي العيد من <span dir="ltr">AGR</span> 🌙</h1>
  <button id="startTrigger" class="start-btn" onclick="showForm()">ابدأ التحدي الآن</button>
</header>

<main id="registrationArea">
  <div class="details">
    <strong>تعليمات الاشتراك:</strong>
    <p>• الدفع متاح عبر (المحافظ الإلكترونية - انستا باي InstaPay).</p>
    <p>• متاح شراء منتجات AGR منفردة خارج التحدي عبر الواتساب.</p>
    <p>• يرجى كتابة الاسم بالإنجليزية فقط لضمان دقة الشهادة.</p>
  </div>

  <form id="directForm">
    <div class="form-section">
        <div class="input-wrapper full-width">
            <label>الاسم الرباعي (English Only)</label>
            <input type="text" id="name" name="name" placeholder="Full Name in English" required>
        </div>
        <div class="input-wrapper">
            <label>تاريخ الميلاد</label>
            <input type="date" id="dob" name="dob" required>
        </div>
        <div class="input-wrapper">
            <label>النوع</label>
            <select id="gender" name="gender" required>
                <option value="">اختر النوع...</option>
                <option value="ذكر">ذكر</option>
                <option value="أنثى">أنثى</option>
            </select>
        </div>
        <div class="input-wrapper">
            <label>المحافظة</label>
            <input type="text" id="city" name="city" required placeholder="اكتب محافظتك">
        </div>
        <div class="input-wrapper">
            <label>رقم الواتساب</label>
            <input type="tel" id="phone" name="phone" required placeholder="01xxxxxxxxx">
        </div>

        <div class="input-wrapper full-width">
            <label>الفئة العمرية</label>
            <select id="category" name="category" required onchange="updateOptions()">
                <option value="">-- اختر الفئة --</option>
                <option value="جونيور (Junior) - حتى 16 سنة">جونيور (Junior) - حتى 16 سنة</option>
                <option value="سينيور (Senior) - فوق 16 سنة">سينيور (Senior) - فوق 16 سنة</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>نوع التحدي</label>
            <select id="challengeDisplay" name="challenge" required disabled></select>
        </div>
        <div class="input-wrapper">
            <label>باقة الاشتراك</label>
            <select id="packageDisplay" name="package" required disabled></select>
        </div>
    </div>
    <button type="submit" id="submitBtn">تأكيد الاشتراك</button>
  </form>
</main>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzZorsOTVptpezXxlZU3eb8MTFNItxF6uSK7M0LipwrgLdthtSOw5BmzV8mX02ngDBe/exec';

    const optionsMap = {
        "جونيور (Junior) - حتى 16 سنة": {
            chals: ["تحدي الجونيور (50 كم جري)"],
            packs: ["ميدالية (100 ج.م)", "ميدالية + تيشيرت كت (250 ج.م)"]
        },
        "سينيور (Senior) - فوق 16 سنة": {
            chals: ["دراجات (300 كم)", "جري (120 كم)", "مشي (100 كم)", "سبيد سكيتر (200 كم)"],
            packs: [
                "ميدالية (100 ج.م)", 
                "ميدالية + تيشيرت (300 ج.م)", 
                "ميدالية + حامل ميداليات (450 ج.م)",
                "ميدالية + تيشيرت + حامل + كاب (600 ج.م)",
                "الباقة الشاملة (750 ج.م)"
            ]
        }
    };

    function showForm() {
        document.getElementById('registrationArea').style.display = 'block';
        document.getElementById('startTrigger').style.display = 'none';
        window.scrollTo({
            top: document.getElementById('registrationArea').offsetTop - 20,
            behavior: 'smooth'
        });
    }

    function updateOptions() {
        const cat = document.getElementById('category').value;
        const chalSel = document.getElementById('challengeDisplay');
        const packSel = document.getElementById('packageDisplay');
        
        chalSel.innerHTML = '<option value="">اختر التحدي</option>';
        packSel.innerHTML = '<option value="">اختر الباقة</option>';

        if (cat && optionsMap[cat]) {
            chalSel.disabled = false; packSel.disabled = false;
            optionsMap[cat].chals.forEach(o => chalSel.add(new Option(o, o)));
            optionsMap[cat].packs.forEach(o => packSel.add(new Option(o, o)));
        }
    }

    document.getElementById('directForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = "جاري الحفظ في AGR...";

        fetch(scriptURL, { 
            method: 'POST', 
            body: new FormData(this)
        })
        .then(response => {
            alert("✅ تم التسجيل بنجاح في تحدي AGR! عيد مبارك.");
            window.location.reload();
        })
        .catch(error => {
            alert("حدث خطأ في الإرسال، حاول مرة أخرى.");
            btn.disabled = false;
            btn.textContent = "تأكيد الاشتراك";
        });
    };
</script>
</body>
</html>
