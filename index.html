<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGR Eid Challenge - التسجيل المباشر</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
    
    body { 
      margin: 0; padding: 0; font-family: 'Cairo', sans-serif; color: #f0f0f0; text-align: center; 
      background: #000 url('static/bg.jpg') no-repeat center center fixed; 
      background-size: cover; scroll-behavior: smooth; 
    }
    
    /* 🎯 الهيدر لإدارة الترتيب */
    header {
      padding: 20px 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* 🔥 اللوجو على اليمين في الكمبيوتر وفي النص في الموبايل */
    .header-icons { 
      width: 120px !important; 
      height: auto !important; 
      display: block;
      margin: 10px 0;
      transition: 0.3s;
      align-self: flex-end; /* بيجيبه يمين */
    }

    .header-icons:hover { transform: scale(1.05); }

    /* ✨ تأثير الـ Glow على العنوان */
    h1 { 
      font-size: 1.8em; 
      color: #ffffff; /* أبيض صريح */
      margin: 15px 0 30px 0; 
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.7), 0 0 20px rgba(255, 255, 255, 0.5); /* الـ Glow */
      align-self: center; /* بيفضل في النص */
    }

    /* 🥈 زرار البداية الفضي اللامع */
    .start-btn { 
      background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 25%, #bdbdbd 50%, #e0e0e0 75%, #ffffff 100%);
      background-size: 200% auto;
      color: #000; padding: 14px 40px; font-size: 1.3em; font-weight: bold; 
      border: 1px solid #ffffff; border-radius: 50px; cursor: pointer; 
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3); 
      transition: 0.5s;
      align-self: center;
    }
    
    .start-btn:hover { 
      background-position: right center; /* تأثير اللمعة المحركة */
      box-shadow: 0 6px 20px rgba(255, 255, 255, 0.5);
    }

    /* 🧊 المربع الشفاف ببلور خفيف جداً */
    main { 
      display: none; padding: 30px 25px; 
      backdrop-filter: blur(5px); /* بلور خفيف أوي */
      background-color: rgba(0, 0, 0, 0.6); /* شفافية عالية */
      margin: 10px auto 40px auto; 
      border-radius: 20px; max-width: 650px; 
      border: 1px solid rgba(255, 255, 255, 0.1); /* حد رفيع جداً */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    
    /* لون الكلام داخل الفورم */
    .details, label, select option { color: #e0e0e0; }
    
    .details { 
      text-align: right; margin-bottom: 25px; padding: 15px; 
      border-right: 4px solid #ffffff; background-color: rgba(255, 255, 255, 0.03); 
      font-size: 0.9em; line-height: 1.8;
    }

    .form-section { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px; }
    .input-wrapper { width: 48%; display: flex; flex-direction: column; text-align: right; }
    .full-width { width: 100%; }

    label { font-weight: bold; margin-bottom: 6px; font-size: 0.85em; }
    
    input, select { 
      padding: 12px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2); 
      background: rgba(255, 255, 255, 0.9); color: #000; /* خلفية بيضاء سادة للكتابة */
      width: 100%; box-sizing: border-box; 
      font-family: 'Cairo', sans-serif; font-size: 0.95em; 
    }
    
    /* زرار الإرسال سيلفر غامق ليليق بالفورم الشفافة */
    button#submitBtn { 
      background: linear-gradient(45deg, #a1a1a1, #555555); 
      color: #fff; font-weight: bold; font-size: 1.2em; padding: 15px; 
      border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; width: 100%; 
      transition: 0.3s;
    }
    
    button#submitBtn:hover { background: linear-gradient(45deg, #bdbdbd, #757575); }

    /* ريسبونسيف للموبايل */
    @media (max-width: 650px) { 
      .input-wrapper { width: 100%; } 
      header { padding: 20px; }
      .header-icons { align-self: center; margin: 10px auto; } /* بيرجع في النص في الموبايل */
    }
  </style>
</head>
<body>

<header>
  <img src="static/logo.png" alt="AGR Logo" class="header-icons">
  <h1>تحدي العيد من <span dir="ltr">AGR</span> 🌙</h1>
  <button id="startTrigger" class="start-btn" onclick="showForm()">ابدأ التحدي الآن</button>
</header>

<main id="registrationArea">
  <div class="details">
    <strong>تعليمات الاشتراك:</strong>
    <p>• الدفع متاح عبر (المحافظ الإلكترونية - انستا باي InstaPay).</p>
    <p>• متاح شراء منتجات AGR منفردة خارج التحدي عبر الواتساب.</p>
    <p>• يرجى كتابة الاسم بالإنجليزية فقط لضمان دقة الشهادة.</p>
  </div>

  <form id="directForm">
    <div class="form-section">
        <div class="input-wrapper full-width">
            <label>الاسم الرباعي (English Only)</label>
            <input type="text" id="name" name="name" placeholder="Full Name in English" required>
        </div>
        <div class="input-wrapper">
            <label>تاريخ الميلاد</label>
            <input type="date" id="dob" name="dob" required>
        </div>
        <div class="input-wrapper">
            <label>النوع</label>
            <select id="gender" name="gender" required>
                <option value="" style="color:#000;">اختر النوع...</option>
                <option value="ذكر" style="color:#000;">ذكر</option>
                <option value="أنثى" style="color:#000;">أنثى</option>
            </select>
        </div>
        <div class="input-wrapper">
            <label>المحافظة</label>
            <input type="text" id="city" name="city" required placeholder="اكتب محافظتك">
        </div>
        <div class="input-wrapper">
            <label>رقم الواتساب</label>
            <input type="tel" id="phone" name="phone" required placeholder="01xxxxxxxxx">
        </div>

        <div class="input-wrapper full-width">
            <label>الفئة العمرية</label>
            <select id="category" name="category" required onchange="updateOptions()">
                <option value="" style="color:#000;">-- اختر الفئة --</option>
                <option value="جونيور (Junior) - حتى 16 سنة" style="color:#000;">جونيور (Junior) - حتى 16 سنة</option>
                <option value="سينيور (Senior) - فوق 16 سنة" style="color:#000;">سينيور (Senior) - فوق 16 سنة</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>نوع التحدي</label>
            <select id="challengeDisplay" name="challenge" required disabled style="color:#000;"></select>
        </div>
        <div class="input-wrapper">
            <label>باقة الاشتراك</label>
            <select id="packageDisplay" name="package" required disabled style="color:#000;"></select>
        </div>
    </div>
    <button type="submit" id="submitBtn">تأكيد الاشتراك</button>
  </form>
</main>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzZorsOTVptpezXxlZU3eb8MTFNItxF6uSK7M0LipwrgLdthtSOw5BmzV8mX02ngDBe/exec';

    const optionsMap = {
        "جونيور (Junior) - حتى 16 سنة": {
            chals: ["تحدي الجونيور (50 كم جري)"],
            packs: ["ميدالية (100 ج.م)", "ميدالية + تيشيرت كت (250 ج.م)"]
        },
        "سينيور (Senior) - فوق 16 سنة": {
            chals: ["دراجات (300 كم)", "جري (120 كم)", "مشي (100 كم)", "سبيد سكيتر (200 كم)"],
            packs: [
                "ميدالية (100 ج.م)", 
                "ميدالية + تيشيرت (300 ج.م)", 
                "ميدالية + حامل ميداليات (450 ج.م)",
                "ميدالية + تيشيرت + حامل + كاب (600 ج.م)",
                "الباقة الشاملة (750 ج.م)"
            ]
        }
    };

    function showForm() {
        document.getElementById('registrationArea').style.display = 'block';
        document.getElementById('startTrigger').style.display = 'none';
        window.scrollTo({
            top: document.getElementById('registrationArea').offsetTop - 20,
            behavior: 'smooth'
        });
    }

    function updateOptions() {
        const cat = document.getElementById('category').value;
        const chalSel = document.getElementById('challengeDisplay');
        const packSel = document.getElementById('packageDisplay');
        
        chalSel.innerHTML = '<option value="" style="color:#000;">اختر التحدي</option>';
        packSel.innerHTML = '<option value="" style="color:#000;">اختر الباقة</option>';

        if (cat && optionsMap[cat]) {
            chalSel.disabled = false; packSel.disabled = false;
            optionsMap[cat].chals.forEach(o => {
                const opt = new Option(o, o);
                opt.style.color = "#000"; // لضمان ظهور الكلام في القائمة
                chalSel.add(opt);
            });
            optionsMap[cat].packs.forEach(o => {
                const opt = new Option(o, o);
                opt.style.color = "#000";
                packSel.add(opt);
            });
        }
    }

    document.getElementById('directForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = "جاري الحفظ في AGR...";

        fetch(scriptURL, { 
            method: 'POST', 
            body: new FormData(this)
        })
        .then(response => {
            alert("✅ تم التسجيل بنجاح في تحدي AGR! عيد مبارك.");
            window.location.reload();
        })
        .catch(error => {
            alert("حدث خطأ في الإرسال، حاول مرة أخرى.");
            btn.disabled = false;
            btn.textContent = "تأكيد الاشتراك";
        });
    };
</script>
</body>
</html>
