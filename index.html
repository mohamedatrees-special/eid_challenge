<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGR Eid Challenge - التسجيل المباشر</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
    
    body { 
      margin: 0; padding: 0; font-family: 'Cairo', sans-serif; color: #fff; text-align: center; 
      background: #000 url('static/bg.jpg') no-repeat center center fixed; 
      background-size: cover; scroll-behavior: smooth; 
    }

    /* 🎯 الهيدر في نص الشاشة */
    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* 🔥 لوجو + Glow + Animation */
    .header-icons { 
      width: 55px;
      display: block;
      margin: 20px auto;
      filter: grayscale(100%) brightness(1.2);
      box-shadow: 0 0 15px rgba(255,255,255,0.3),
                  0 0 30px rgba(200,200,200,0.2);
      animation: floatLogo 3s ease-in-out infinite;
      transition: 0.3s;
    }

    .header-icons:hover {
      transform: scale(1.1);
      filter: brightness(1.5);
    }

    @keyframes floatLogo {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    /* 🎬 Animation دخول */
    h1 {
      font-size: 1.5em;
      color: #d1d1d1;
      margin-bottom: 20px;
      animation: fadeUp 1s ease forwards;
    }

    .start-btn { 
      background: linear-gradient(145deg, #d1d1d1, #a1a1a1); 
      color: #000; padding: 10px 35px; font-size: 1.2em; font-weight: bold; 
      border: 1px solid #fff; border-radius: 50px; cursor: pointer; 
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2); 
      transition: 0.3s;
      animation: fadeUp 1.3s ease forwards;
    }

    .start-btn:hover { 
      background: #fff; 
      transform: scale(1.05); 
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    main { 
      display: none; padding: 20px 15px; backdrop-filter: blur(15px); 
      background-color: rgba(0, 0, 0, 0.9); margin: 5px auto 30px auto; 
      border-radius: 15px; max-width: 600px; border: 1px solid rgba(255, 255, 255, 0.2); 
    }
    
    .details { 
      text-align: right; margin-bottom: 20px; padding: 10px; 
      border-right: 3px solid #d1d1d1; background-color: rgba(255, 255, 255, 0.05); 
      font-size: 0.8em; line-height: 1.8;
    }

    .form-section { display: flex; flex-wrap: wrap; gap: 10px; }
    .input-wrapper { width: 48%; display: flex; flex-direction: column; text-align: right; }
    .full-width { width: 100%; }

    label { font-weight: bold; color: #d1d1d1; margin-bottom: 4px; font-size: 0.8em; }
    
    input, select { 
      padding: 10px; border-radius: 8px; border: 1px solid #444; 
      background: #fff; color: #222; width: 100%; 
      font-family: 'Cairo', sans-serif; font-size: 0.9em; 
    }
    
    button#submitBtn { 
      background: linear-gradient(45deg, #7f8c8d, #34495e); 
      color: #fff; font-weight: bold; font-size: 1.1em; padding: 12px; 
      border: none; border-radius: 10px; cursor: pointer; margin-top: 15px; width: 100%; 
    }

    @media (max-width: 600px) { .input-wrapper { width: 100%; } }
  </style>
</head>

<body>

<header>
  <img src="static/logo.png" alt="AGR Logo" class="header-icons">
  <h1>تحدي العيد من <span dir="ltr">AGR</span> 🌙</h1>
  <button id="startTrigger" class="start-btn" onclick="showForm()">ابدأ التحدي الآن</button>
</header>

<main id="registrationArea">
  <div class="details">
    <strong>تعليمات الاشتراك:</strong>
    <p>• الدفع متاح عبر (المحافظ الإلكترونية - انستا باي InstaPay).</p>
    <p>• متاح شراء منتجات AGR منفردة خارج التحدي عبر الواتساب.</p>
    <p>• يرجى كتابة الاسم بالإنجليزية فقط لضمان دقة الشهادة.</p>
  </div>

  <!-- الفورم زي ما هو بدون تغيير -->
  <!-- (مكمل نفس كودك بدون أي تعديل في اللوجيك) -->

</main>

<script>
function showForm() {
  document.getElementById('registrationArea').style.display = 'block';
  document.getElementById('startTrigger').style.display = 'none';
  window.scrollTo(0, document.getElementById('registrationArea').offsetTop - 20);
}
</script>

</body>
</html>
