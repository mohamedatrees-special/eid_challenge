<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGR Eid Challenge - التسجيل الرسمي</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

    body { 
      margin: 0; 
      padding: 0; 
      font-family: 'Cairo', Arial, sans-serif; 
      color: #fff; 
      text-align: center;
      /* تأكد من وجود صورة الخلفية في فولدر static */
      background: #111 url('static/bg.jpg') no-repeat center center fixed;
      background-size: cover;
      line-height: 1.6;
    }

    header {
      padding: 40px 20px;
      text-align: center;
    }

    .header-icons img { 
        width: 130px; 
        filter: drop-shadow(0 0 15px rgba(255, 221, 0, 0.6));
    }

    header h1 {
      font-size: 2.5em;
      font-weight: bold;
      color: #ffdd00;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
      margin-top: 15px;
    }

    main {
      padding: 30px 20px;
      backdrop-filter: blur(12px);
      background-color: rgba(0, 0, 0, 0.85);
      margin: 0 auto 50px auto;
      border-radius: 20px;
      max-width: 800px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
    }

    .details {
      text-align: right;
      margin-bottom: 25px;
      padding: 15px;
      border-right: 4px solid #ffdd00;
      background-color: rgba(255, 255, 255, 0.05);
    }

    .details h3 { color: #ffdd00; margin-top: 0; }
    .details p { font-size: 0.95em; margin: 5px 0; }

    .form-section {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 15px;
    }

    .input-wrapper {
        width: 48%; 
        display: flex;
        flex-direction: column;
        text-align: right;
    }

    .full-width { width: 100%; }

    label {
        font-weight: bold;
        color: #ffdd00;
        margin-bottom: 8px;
        font-size: 0.9em;
    }

    input, select { 
      padding: 14px; 
      border-radius: 10px; 
      border: 1px solid #444; 
      font-size: 1em;
      font-family: 'Cairo', sans-serif;
      background: #ffffff;
      color: #222;
      width: 100%; 
      box-sizing: border-box;
      transition: 0.3s;
    }

    input:focus, select:focus {
        border-color: #ffdd00;
        outline: none;
        box-shadow: 0 0 10px rgba(255, 221, 0, 0.4);
    }

    button#submitBtn {
      background: linear-gradient(45deg, #ff4500, #ff8c00);
      color: #fff;
      font-weight: bold;
      font-size: 1.4em;
      padding: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 30px;
      width: 100%;
      transition: 0.4s;
      text-transform: uppercase;
      box-shadow: 0 8px 20px rgba(255, 69, 0, 0.4);
    }

    button#submitBtn:hover { 
        background: linear-gradient(45deg, #e03e00, #ff4500);
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(255, 69, 0, 0.6);
    }

    button#submitBtn:disabled {
        background: #444;
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
    }

    @media (max-width: 650px) {
        .input-wrapper { width: 100%; }
        header h1 { font-size: 1.8em; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-icons">
      <img src="static/logo.png" alt="AGR Logo">
  </div>
  <h1>تحدي العيد من <span dir="ltr">AGR</span> 🌙</h1>
</header>

<main>
  <div class="details">
    <h3>تسجيل البيانات</h3>
    <p>• يرجى إدخال الاسم بالإنجليزية فقط لضمان دقة الشهادات.</p>
    <p>• تأكد من صحة رقم الواتساب للتواصل معك.</p>
  </div>

  <form id="agrRegistrationForm">
    <div class="form-section">
        <div class="input-wrapper full-width">
            <label>الاسم الرباعي (English Only)</label>
            <input type="text" id="name" placeholder="Full Name in English" pattern="[a-zA-Z\s]+" title="English letters only" required>
        </div>

        <div class="input-wrapper">
            <label>تاريخ الميلاد</label>
            <input type="date" id="dob" required>
        </div>

        <div class="input-wrapper">
            <label>النوع</label>
            <select id="gender" required>
                <option value="">اختر النوع...</option>
                <option value="ذكر">ذكر</option>
                <option value="أنثى">أنثى</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>المحافظة / المدينة</label>
            <input type="text" id="city" placeholder="اكتب محافظتك" required>
        </div>

        <div class="input-wrapper">
            <label>رقم الواتساب</label>
            <input type="tel" id="phone" placeholder="01xxxxxxxxx" required>
        </div>

        <div class="input-wrapper full-width">
            <label>الفئة العمرية</label>
            <select id="category" required onchange="updateOptions()">
                <option value="">-- اضغط هنا لاختيار الفئة العمرية أولاً --</option>
                <option value="جونيور (Junior) - حتى 16 سنة">جونيور (Junior) - حتى 16 سنة</option>
                <option value="سينيور (Senior) - فوق 16 سنة">سينيور (Senior) - فوق 16 سنة</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>نوع التحدي والمسافة</label>
            <select id="challenge" required disabled>
                <option value="">اختر الفئة العمرية أولاً</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>باقة الاشتراك</label>
            <select id="package" required disabled>
                <option value="">اختر الفئة العمرية أولاً</option>
            </select>
        </div>
    </div>

    <button type="submit" id="submitBtn">تأكيد واشتراك الآن</button>
  </form>
</main>

<script>
    // الإعدادات الخاصة بجوجل فورم (Entry IDs)
    const config = {
        formAction: "https://docs.google.com/forms/d/e/1FAIpQLSfOMCIhwk6-yrqu-yx-sxwHKjFSLDPsmnyEcWAod6Ql6zxsiw/formResponse",
        fields: {
            name: "entry.1112362374",
            city: "entry.714961820",
            phone: "entry.380930077",
            dob: "entry.430574773",
            gender: "entry.444597116",
            ageCat: "entry.1888533519",
            jChal: "entry.1995806128",
            jPack: "entry.185047638",
            sChal: "entry.762355901",
            sPack: "entry.1842057656"
        }
    };

    // الخيارات المتاحة (يجب أن تطابق نص الجوجل فورم بدقة)
    const optionsMap = {
        "جونيور (Junior) - حتى 16 سنة": {
            challenges: ["تحدي الجونيور (50 كم جري)"],
            packages: ["ميدالية (100 ج.م)", "ميدالية + تيشرت كَت (250 ج.م)"]
        },
        "سينيور (Senior) - فوق 16 سنة": {
            challenges: ["دراجات (300 كم)", "جري (120 كم)", "مشي (100 كم)", "سبيد سكيتر (200 كم)"],
            packages: ["ميدالية (100 ج.م)", "ميدالية + تيشرت (300 ج.م)", "ميدالية + حامل ميداليات (450 ج.م)"]
        }
    };

    function updateOptions() {
        const cat = document.getElementById('category').value;
        const chalSelect = document.getElementById('challenge');
        const packSelect = document.getElementById('package');

        chalSelect.innerHTML = '<option value="">اختر التحدي</option>';
        packSelect.innerHTML = '<option value="">اختر الباقة</option>';

        if (cat && optionsMap[cat]) {
            chalSelect.disabled = false;
            packSelect.disabled = false;
            optionsMap[cat].challenges.forEach(opt => chalSelect.add(new Option(opt, opt)));
            optionsMap[cat].packages.forEach(opt => packSelect.add(new Option(opt, opt)));
        } else {
            chalSelect.disabled = true;
            packSelect.disabled = true;
        }
    }

    document.getElementById('agrRegistrationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = "جاري معالجة طلبك...";

        const cat = document.getElementById('category').value;
        const formData = new FormData();

        // ربط الحقول بالـ Entry IDs
        formData.append(config.fields.name, document.getElementById('name').value);
        formData.append(config.fields.dob, document.getElementById('dob').value);
        formData.append(config.fields.gender, document.getElementById('gender').value);
        formData.append(config.fields.city, document.getElementById('city').value);
        formData.append(config.fields.phone, document.getElementById('phone').value);
        formData.append(config.fields.ageCat, cat);

        // منطق إرسال التحدي والباقة حسب الفئة العمرية
        if (cat.includes("جونيور")) {
            formData.append(config.fields.jChal, document.getElementById('challenge').value);
            formData.append(config.fields.jPack, document.getElementById('package').value);
        } else {
            formData.append(config.fields.sChal, document.getElementById('challenge').value);
            formData.append(config.fields.sPack, document.getElementById('package').value);
        }

        // إرسال البيانات باستخدام Fetch API
        fetch(config.formAction, {
            method: "POST",
            mode: "no-cors",
            body: formData
        })
        .then(() => {
            // نجاح تقني (بسبب no-cors نفترض النجاح عند اكتمال الطلب)
            setTimeout(() => {
                alert("تم إرسال بياناتك بنجاح لـ AGR!\n\nسنقوم بمراجعة الطلب والتواصل معك عبر الواتساب لتأكيد الاشتراك. عيد مبارك!");
                this.reset();
                updateOptions();
                btn.disabled = false;
                btn.textContent = "تأكيد واشتراك الآن";
            }, 1000);
        })
        .catch(err => {
            alert("حدث خطأ في الاتصال، يرجى التأكد من الإنترنت والمحاولة مرة أخرى.");
            btn.disabled = false;
            btn.textContent = "تأكيد واشتراك الآن";
        });
    });
</script>

</body>
</html>
