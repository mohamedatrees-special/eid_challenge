<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGR Eid Challenge - التسجيل</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

    body { 
      margin: 0; 
      padding: 0; 
      font-family: 'Cairo', Arial, sans-serif; 
      color: #fff; 
      text-align: center;
      /* إضافة صورة الخلفية التي حددتها */
      background: url('static/bg.jpg') no-repeat center center fixed;
      background-size: cover;
      line-height: 1.6;
    }

    header {
      padding: 30px 20px;
      text-align: center;
    }

    .header-icons img { 
        width: 120px; 
        filter: drop-shadow(0 0 10px rgba(255, 221, 0, 0.5));
    }

    header h1 {
      font-size: 2.8em;
      font-weight: bold;
      color: #ffdd00;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
      margin-top: 20px;
    }

    main {
      padding: 30px 20px;
      backdrop-filter: blur(10px);
      background-color: rgba(0, 0, 0, 0.7); /* تغميق الخلفية لزيادة وضوح الكلام */
      margin: 20px auto;
      border-radius: 15px;
      max-width: 850px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .details {
      text-align: right;
      margin-bottom: 30px;
      padding: 20px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 10px;
      background-color: rgba(255, 255, 255, 0.05);
    }

    .details h3 { color: #ffdd00; border-bottom: 2px solid #ffdd00; display: inline-block; padding-bottom: 8px;}
    .details ul { list-style-type: disc; padding-right: 25px; margin: 15px 0; }
    .details li { margin-bottom: 10px; }

    .form-section {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 20px;
    }

    .input-wrapper {
        width: 48%; 
        display: flex;
        flex-direction: column;
        text-align: right;
    }

    .full-width { width: 100%; }

    label {
        font-weight: bold;
        color: #ffdd00;
        margin-bottom: 5px;
        font-size: 0.9em;
    }

    input, select { 
      padding: 12px; 
      border-radius: 6px; 
      border: 1px solid #555; 
      font-size: 1em;
      font-family: 'Cairo', sans-serif;
      background: #f9f9f9;
      color: #333;
      width: 100%; 
      box-sizing: border-box;
    }

    input:focus, select:focus {
        border-color: #ffdd00;
        outline: none;
        box-shadow: 0 0 8px rgba(255, 221, 0, 0.5);
    }

    input:disabled, select:disabled {
        background: #ccc;
        cursor: not-allowed;
        color: #666;
    }

    button#submitBtn {
      background-color: #ff4500;
      color: #fff;
      font-weight: bold;
      font-size: 1.3em;
      padding: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(255, 69, 0, 0.3);
    }

    button#submitBtn:hover { background-color: #e03e00; transform: scale(1.01); }

    @media (max-width: 600px) {
        .input-wrapper { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-icons">
      <img src="static/logo.png" alt="AGR Logo">
  </div>
  <h1>تحدي العيد من <span dir="ltr">AGR</span> 🌙</h1>
</header>

<main>
  <div class="details">
    <h3>تعليمات هامة للتسجيل</h3>
    <ul>
        <li>يجب كتابة الاسم باللغة الإنجليزية فقط لضمان طباعته بشكل صحيح على الشهادات والميداليات.</li>
        <li>التحدي مستمر لمدة شهر كامل بمناسبة العيد.</li>
        <li>جميع المنتجات الرياضية من صناعة <strong>AGR</strong> بجودة احترافية.</li>
    </ul>
  </div>

  <form id="regForm">
    <div class="form-section">
        <div class="input-wrapper full-width">
            <label>الاسم الرباعي (باللغة الإنجليزية)</label>
            <input type="text" id="name" placeholder="Full Name (English Only)" pattern="[a-zA-Z\s]+" title="الاسم باللغة الإنجليزية فقط" required>
        </div>

        <div class="input-wrapper">
            <label>تاريخ الميلاد</label>
            <input type="date" id="dob" required>
        </div>

        <div class="input-wrapper">
            <label>النوع</label>
            <select id="gender" required>
                <option value="">اختر النوع...</option>
                <option value="male">ذكر</option>
                <option value="female">أنثى</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>المحافظة</label>
            <input type="text" id="governorate" placeholder="اكتب محافظتك" required>
        </div>

        <div class="input-wrapper">
            <label>رقم الواتساب</label>
            <input type="tel" id="phone" placeholder="مثال: 01xxxxxxxxx" required>
        </div>

        <div class="input-wrapper full-width">
            <label>الفئة العمرية</label>
            <select id="category" required onchange="updateDynamicInputs()">
                <option value="">-- اضغط هنا لاختيار الفئة العمرية أولاً --</option>
                <option value="senior">سينيور (Senior) - 16 سنة فما فوق</option>
                <option value="junior">جونيور (Junior) - تحت 16 سنة</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>نوع التحدي والمسافة</label>
            <select id="challengeType" required disabled>
                <option value="">-- مقفول: اختر الفئة العمرية أولاً --</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>باقة الاشتراك</label>
            <select id="packageType" required disabled>
                <option value="">-- مقفول: اختر الفئة العمرية أولاً --</option>
            </select>
        </div>
    </div>

    <button type="submit" id="submitBtn">تأكيد التسجيل</button>
  </form>
</main>

<script>
    // 1. بيانات التحديات والباقات (للعرض)
    const dataOptions = {
        senior: {
            challenges: [
                { val: 'cycling_300', text: 'دراجات (300 كم)' },
                { val: 'running_120', text: 'جري (120 كم)' },
                { val: 'walking_100', text: 'مشي (100 كم)' },
                { val: 'skating_200', text: 'سبيد سكيتر (200 كم)' }
            ],
            packages: [
                { val: 's_100', text: 'ميدالية (100 ج.م)' },
                { val: 's_300', text: 'ميدالية + تيشرت (300 ج.م)' },
                { val: 's_450', text: 'ميدالية + حامل ميداليات (450 ج.م)' },
                { val: 's_600', text: 'ميدالية+تيشرت+حامل+كاب (600 ج.م)' },
                { val: 's_750', text: 'الباقة الشاملة (750 ج.م)' }
            ]
        },
        junior: {
            challenges: [
                { val: 'junior_run_50k', text: 'جري (50 كم)' }
            ],
            packages: [
                { val: 'j_100', text: 'ميدالية (100 ج.م)' },
                { val: 'j_250', text: 'ميدالية + تيشرت كَت (250 ج.م)' }
            ]
        }
    };

    // 2. معرفات جوجل فورم (Entry IDs) التي زودتني بها
    const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfOMCIhwk6-yrqu-yx-sxwHKjFSLDPsmnyEcWAod6Ql6zxsiw/formResponse";
    const entryIds = {
        name: "entry.1112362374",
        city: "entry.714961820",
        phone: "entry.380930077",
        dob: "entry.430574773",
        gender: "entry.444597116",
        ageCategory: "entry.1888533519",
        juniorChallenge: "entry.1995806128",
        juniorPackage: "entry.185047638",
        seniorChallenge: "entry.762355901",
        seniorPackage: "entry.1842057656"
    };

    function updateDynamicInputs() {
        const category = document.getElementById('category').value;
        const challengeSelect = document.getElementById('challengeType');
        const packageSelect = document.getElementById('packageType');

        challengeSelect.innerHTML = '';
        packageSelect.innerHTML = '';

        if (category) {
            challengeSelect.disabled = false;
            packageSelect.disabled = false;
            challengeSelect.add(new Option('-- اختر نوع التحدي --', ''));
            packageSelect.add(new Option('-- اختر باقة الاشتراك --', ''));

            dataOptions[category].challenges.forEach(item => challengeSelect.add(new Option(item.text, item.val)));
            dataOptions[category].packages.forEach(item => packageSelect.add(new Option(item.text, item.val)));

            if (category === 'junior') challengeSelect.value = 'junior_run_50k';
        } else {
            challengeSelect.disabled = true;
            packageSelect.disabled = true;
            challengeSelect.add(new Option('-- مقفول: اختر الفئة العمرية أولاً --', ''));
            packageSelect.add(new Option('-- مقفول: اختر الفئة العمرية أولاً --', ''));
        }
    }

    document.getElementById('regForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        if (!/^[a-zA-Z\s]+$/.test(name)) {
            alert("يرجى كتابة الاسم باللغة الإنجليزية فقط.");
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.textContent = "جاري الإرسال...";
        submitBtn.disabled = true;

        const category = document.getElementById('category').value;
        const formData = new FormData();

        // إرسال البيانات الأساسية
        formData.append(entryIds.name, name);
        formData.append(entryIds.dob, document.getElementById('dob').value);
        formData.append(entryIds.gender, document.getElementById('gender').value);
        formData.append(entryIds.city, document.getElementById('governorate').value);
        formData.append(entryIds.phone, document.getElementById('phone').value);
        formData.append(entryIds.ageCategory, category);

        // منطق الإرسال الذكي بناءً على الفئة
        const challengeVal = document.getElementById('challengeType').value;
        const packageVal = document.getElementById('packageType').value;

        if (category === 'junior') {
            formData.append(entryIds.juniorChallenge, challengeVal);
            formData.append(entryIds.juniorPackage, packageVal);
        } else {
            formData.append(entryIds.seniorChallenge, challengeVal);
            formData.append(entryIds.seniorPackage, packageVal);
        }

        fetch(googleFormUrl, {
            method: "POST",
            mode: "no-cors",
            body: formData
        }).then(() => {
            alert("تم التسجيل بنجاح! عيد مبارك.");
            document.getElementById('regForm').reset();
            updateDynamicInputs();
            submitBtn.textContent = "تأكيد التسجيل";
            submitBtn.disabled = false;
        }).catch(() => {
            alert("حدث خطأ، يرجى المحاولة مرة أخرى.");
            submitBtn.disabled = false;
        });
    });
</script>

</body>
</html>
